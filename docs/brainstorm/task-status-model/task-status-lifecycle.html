<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>synlynk — Task Status Lifecycle</title>
<style>
:root{--bg:#0E0E0F;--bg-card:#111115;--blue:#5B8DEF;--purple:#A259F7;--teal:#2EC4A0;--orange:#D97757;--text:#E9E9EE;--muted:rgba(233,233,238,0.55);--border:rgba(255,255,255,0.07);--font:'Inter',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);padding:16px;}
.title{font-size:14px;font-weight:700;letter-spacing:-0.4px;text-align:center;margin-bottom:14px;}
.states{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:820px;margin:0 auto;}
.state{border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;min-width:108px;background:var(--bg-card);}
.state.blue{border-color:var(--blue);}
.state.teal{border-color:var(--teal);}
.state.orange{border-color:var(--orange);}
.state.purple{border-color:var(--purple);}
.state.muted{border-color:var(--muted);}
.state-label{font-weight:600;font-size:12px;}
.trans{margin:12px auto;text-align:center;font-size:10px;color:var(--muted);max-width:620px;}
.note{margin:14px auto 0;max-width:420px;background:#0a0a0b;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
<div class="title">Five-State Task Status Model</div>

<div class="states">
  <div class="state blue"><div class="state-label">[ ] active</div></div>
  <div class="state teal"><div class="state-label">[x] done</div></div>
  <div class="state orange"><div class="state-label">[-] deferred</div></div>
  <div class="state purple"><div class="state-label">[~] superseded</div></div>
  <div class="state muted"><div class="state-label">[>] absorbed</div></div>
</div>

<div class="trans">active → done (completed) • active → deferred (postponed) • active → superseded (replaced) • active → absorbed (merged) • any → active (reopened)</div>

<div class="note">Checkpoint archives all non-active tasks before compaction</div>
</body>
</html>
