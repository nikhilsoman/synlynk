    <circle cx="-46" cy="-74" r="5" fill="#FEBC2E"/>
    <circle cx="-30" cy="-74" r="5" fill="#28C840"/>
    <text x="-72" y="62" font-family="'Courier New', monospace" font-size="11" fill="#2EC4A0" opacity="0.7">&#9654;</text>
    <rect x="-57" y="51" width="2" height="14" rx="1" fill="#A259F7" opacity="0.8"/>
    <path d="M 6 -46 C 6 -46 -28 -46 -28 -22 C -28 2 14 2 14 26" fill="none" stroke="#5B8DEF" stroke-width="11" stroke-linecap="round"/>
    <path d="M 14 26 C 14 26 46 26 46 2 C 46 -22 6 -22 6 -46" fill="none" stroke="#A259F7" stroke-width="11" stroke-linecap="round"/>
