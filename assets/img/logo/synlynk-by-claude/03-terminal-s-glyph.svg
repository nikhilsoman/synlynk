    <rect x="-20" y="-20" width="40" height="40" rx="8" fill="#0E0E0F"/>
    <rect x="-20" y="-20" width="40" height="8" rx="8" fill="#1C1C1E"/>
    <rect x="-20" y="-16" width="40" height="4" fill="#1C1C1E"/>
    <circle cx="-13" cy="-16" r="1.5" fill="#FF5F57"/>
    <circle cx="-8" cy="-16" r="1.5" fill="#FEBC2E"/>
    <circle cx="-3" cy="-16" r="1.5" fill="#28C840"/>
    <path d="M 1 -9 C 1 -9 -6 -9 -6 -4 C -6 1 3 1 3 6" fill="none" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 3 6 C 3 6 10 6 10 1 C 10 -4 1 -4 1 -9" fill="none" stroke="#A259F7" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 3 6 L 3 11" fill="none" stroke="#2EC4A0" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="1" cy="-9" r="2" fill="#5B8DEF"/>
    <circle cx="3" cy="11" r="2" fill="#2EC4A0"/>
