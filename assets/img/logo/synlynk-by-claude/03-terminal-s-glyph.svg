  <text x="321" y="216" class="tag">synaptic link for ai dev</text>
  <line x1="318" y1="228" x2="610" y2="228" stroke="#eee" stroke-width="0.5"/>

  <!-- Scale previews -->
  <text x="40" y="298" class="vt">at scale &#8594;</text>

  <!-- 64px -->
  <g transform="translate(130, 340)">
    <rect x="-32" y="-32" width="64" height="64" rx="13" fill="#0E0E0F"/>
    <rect x="-32" y="-32" width="64" height="12" rx="13" fill="#1C1C1E"/>
